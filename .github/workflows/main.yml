on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types:
      - created

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      - run: pnpm install
      - name: Install VS Code
        if: runner.os == 'Linux'
        run: |
          curl -L --fail -o /tmp/code.deb "https://update.code.visualstudio.com/1.105.0/linux-deb-x64/stable"
          sudo apt-get update
          sudo apt-get install -y /tmp/code.deb
      - name: Configure VS Code path
        if: runner.os == 'Linux'
        run: |
          echo "VSCODE_EXECUTABLE_PATH=/usr/bin/code" >> "$GITHUB_ENV"
          /usr/bin/code --version
      - run: xvfb-run -a pnpm test
        if: runner.os == 'Linux'
      - run: pnpm test
        if: runner.os != 'Linux'

  release:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
      - run: pnpm install
      - name: Package Extension
        run: |
          pnpm run package
          npx vsce package --no-dependencies
      - name: Upload Extension to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish
        run: pnpm run deploy
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v2
        id: publishToOpenVSX
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          dependencies: false
